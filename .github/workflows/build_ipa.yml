name: Build OBSIDIAN IPA & Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 1. تحميل أداة بناء المشاريع السحرية
      - name: Install XcodeGen
        run: brew install xcodegen

      # 2. بناء ملف OBSIDIAN.xcodeproj تلقائياً من أكواد السويفت الموجودة في المستودع
      - name: Generate Xcode Project Dynamically
        run: |
          cat << 'EOF' > project.yml
          name: OBSIDIAN
          options:
            bundleIdPrefix: com.obsidian
          targets:
            OBSIDIAN:
              type: application
              platform: iOS
              deploymentTarget: "16.0"
              sources:
                - path: .
                  excludes:
                    - ".github"
                    - "project.yml"
              settings:
                base:
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGNING_ALLOWED: "NO"
                  GENERATE_INFOPLIST_FILE: "YES"
                  CURRENT_PROJECT_VERSION: "1"
                  MARKETING_VERSION: "1.0.0"
                  PRODUCT_NAME: "OBSIDIAN"
          EOF
          xcodegen generate

      - name: Select Latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      # 3. بناء التطبيق بعد أن تم إنشاء المشروع بنجاح وإجباره على الحفظ في مجلد معروف
      - name: Compile OBSIDIAN Source Code
        run: |
          xcodebuild clean build \
            -project OBSIDIAN.xcodeproj \
            -scheme OBSIDIAN \
            -sdk iphoneos \
            -configuration Release \
            CONFIGURATION_BUILD_DIR=${PWD}/build_output \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      # 4. تغليف التطبيق كملف IPA خام
      - name: Package into Raw IPA
        run: |
          mkdir -p Payload
          mv build_output/OBSIDIAN.app Payload/
          zip -r OBSIDIAN.ipa Payload/

      # 5. تنظيف قسم الريليز من الإصدارات القديمة
      - name: Clean Old Release Tag
        run: |
          gh release delete latest-app --yes || true
          git push --delete origin latest-app || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6. رفع الـ IPA الجديد والمكتمل إلى قسم الإصدارات
      - name: Publish IPA to Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest-app
          name: "OBSIDIAN Latest IPA"
          body: "تم تجميع وبناء هذا التطبيق بنجاح عبر محرك OBSIDIAN الآلي."
          draft: false
          prerelease: false
          files: OBSIDIAN.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
